<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e293b" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-vendor.png" />

  <link rel="stylesheet" href="style.css">

  

  
  <title>AutoPart | Gestão de Fornecedores</title>
</head>
<body>
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="fw-bold text-primary">AutoPart</h1>
      <p class="text-muted">Sistema de Cadastro de Fornecedores</p>
    </header>

    <!-- Formulário de Cadastro -->
    <section class="card shadow-sm mb-4 border-0">
      <div class="card-body p-4">
        <h2 id="form-title" class="h5 mb-4 fw-bold">Novo Fornecedor</h2>

        <form id="entry-form">
          <input type="hidden" id="entry-id" />

          <div class="row">
            <!-- Campo Empresa -->
            <div class="col-md-6 mb-3">
              <label for="Empresa" class="form-label fw-semibold">Nome da Empresa</label>
              <input type="text" id="Empresa" class="form-control" placeholder="Razão Social" required />
            </div>

            <!-- Campo CNPJ -->
            <div class="col-md-6 mb-3">
              <label for="CNPJ" class="form-label fw-semibold">CNPJ (apenas números)</label>
              <input type="number" id="CNPJ" class="form-control" placeholder="00000000000000" required />
            </div>
          </div>

          <!-- Campo Email -->
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">E-mail de Contato</label>
            <input type="email" id="email" class="form-control" placeholder="contato@empresa.com" required />
          </div>

          <!-- Campo Descrição -->
          <div class="mb-3">
            <label for="descricao" class="form-label fw-semibold">Descrição das Peças/Serviços</label>
            <textarea id="descricao" rows="3" class="form-control" placeholder="Ex: Fornecedor de pastilhas de freio e discos..." required></textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary px-4">Salvar Registro</button>
            <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar Edição</button>
          </div>
        </form>

        <p id="message" class="mt-3 mb-0 fw-medium text-success"></p>
      </div>
    </section>

    <!-- Lista de Registros -->
    <section class="card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="h5 mb-0 fw-bold">Fornecedores Cadastrados</h2>
          <button id="reload-btn" class="btn btn-sm btn-outline-secondary">Atualizar Lista</button>
        </div>

        <div id="entries-list">
          <!-- O conteúdo será gerado pelo app.js -->
          <p class="text-center text-muted">Carregando dados...</p>
        </div>
      </div>
    </section>
  </div>

  <!-- Script Principal -->
  <script src="app.js"></script>
</body>
</html>
